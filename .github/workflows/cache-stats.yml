name: Cache · GitHub Stats SVGs

# Downloads the GitHub Stats and Top-Languages cards from the public
# github-readme-stats endpoint and commits them under assets/ so the
# README is fully self-contained (no runtime dependency on the live
# service or the personal Vercel deployment).

on:
  schedule:
    # Mondays at 06:00 UTC
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - '.github/workflows/cache-stats.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Try the public endpoint first; if it 503s (it gets rate-limited
  # often) fall back to the personal Vercel deployment of the fork.
  PRIMARY_BASE: https://github-readme-stats.vercel.app/api
  FALLBACK_BASE: https://github-readme-stats-kw8r-nathanredblur.vercel.app/api
  STATS_QUERY: hide_border=true&bg_color=0b0d12&title_color=a78bfa&icon_color=22d3ee&text_color=cbd5e1&border_radius=16
  USERNAME: nathanredblur

jobs:
  cache:
    name: Refresh stats SVGs in assets/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download stats overview (with fallback)
        run: |
          set -e
          QS="username=${USERNAME}&count_private=true&show_icons=true&${STATS_QUERY}"
          if ! curl -fsSL --retry 3 --retry-delay 5 \
                 "${PRIMARY_BASE}?${QS}" -o assets/stats-overview.svg; then
            echo "::warning::Primary endpoint failed — falling back to personal deployment."
            curl -fsSL --retry 3 --retry-delay 5 \
              "${FALLBACK_BASE}?${QS}" -o assets/stats-overview.svg
          fi

      - name: Download top languages (with fallback)
        run: |
          set -e
          QS="username=${USERNAME}&layout=compact&${STATS_QUERY}"
          if ! curl -fsSL --retry 3 --retry-delay 5 \
                 "${PRIMARY_BASE}/top-langs/?${QS}" -o assets/stats-langs.svg; then
            echo "::warning::Primary endpoint failed — falling back to personal deployment."
            curl -fsSL --retry 3 --retry-delay 5 \
              "${FALLBACK_BASE}/top-langs/?${QS}" -o assets/stats-langs.svg
          fi

      - name: Sanity check (must be SVG, not an error page)
        run: |
          for f in assets/stats-overview.svg assets/stats-langs.svg; do
            if ! head -c 200 "$f" | grep -q '<svg'; then
              echo "::error::$f does not look like an SVG file:"
              head -c 500 "$f"
              exit 1
            fi
          done

      - name: Commit changes (if any)
        run: |
          if [[ -n "$(git status --porcelain assets/stats-*.svg)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/stats-overview.svg assets/stats-langs.svg
            git commit -m "chore(stats): refresh cached GitHub stats SVGs"
            git push
          else
            echo "Stats SVGs are unchanged — nothing to commit."
          fi
